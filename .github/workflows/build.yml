name: build

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET Framework SDK
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore src/YSMInstaller.csproj

      - name: Build (Release)
        run: dotnet build src/YSMInstaller.csproj --configuration Release --no-restore -p:WarningLevel=4

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: YSMInstaller-${{ github.sha }}
          path: src/bin/Release/YSMInstaller.exe
          if-no-files-found: error
          retention-days: 14

  draft-release:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: YSMInstaller-${{ github.sha }}
          path: ./artifact

      # Delete-then-recreate instead of upserting via softprops because softprops leaves
      # the `latest-build` tag pinned to the first commit it ever pointed at, and the
      # release body/title don't reliably refresh on a draft-state release. Recreating
      # the release with --target HEAD makes the tag, body, and assets all reflect the
      # commit that just merged.
      - name: Recreate rolling draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eu
          gh release delete latest-build --yes --cleanup-tag --repo "$REPO" 2>/dev/null || true

          HEAD_FIRST_LINE="$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | head -n 1)"

          cat > release_notes.md <<EOF
          Rolling draft from the latest merge to \`$REF_NAME\`.

          **Commit**: $COMMIT_SHA
          **Run**: #$RUN_NUMBER
          **Message**: $HEAD_FIRST_LINE

          Smoke-test before promoting to a real versioned release.
          EOF

          gh release create latest-build ./artifact/YSMInstaller.exe \
            --repo "$REPO" \
            --title "Latest build (auto-draft)" \
            --target "$COMMIT_SHA" \
            --draft \
            --prerelease \
            --notes-file release_notes.md
